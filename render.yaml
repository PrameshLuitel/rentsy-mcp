services:
  - type: web
    name: rentsy-mcp
    env: python
    buildCommand: |
      echo "=== Rentsy Build ===" && \
      echo "Node: $(node -v 2>/dev/null || echo 'N/A')" && \
      echo "NPM: $(npm -v 2>/dev/null || echo 'N/A')" && \
      pip install -e . && \
      cd frontend && \
      npm install && \
      npm run build && \
      echo "=== Frontend built ===" && \
      ls -la dist/
    startCommand: python src/app.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
